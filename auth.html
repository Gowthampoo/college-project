<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register - SVS College</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins",sans-serif; outline:none !important; }
    body {
      min-height:100vh; display:flex; justify-content:center; align-items:center;
      background:linear-gradient(135deg,#0b1f3a,#142f54,#1c3d6e);
      padding: 20px;
    }
    .box {
      width:100%; max-width:420px; padding:35px;
      background:rgba(255,255,255,0.08); backdrop-filter:blur(12px);
      border-radius:15px; border:1px solid rgba(212,175,55,0.3); color:white;
    }
    h2 { text-align:center; margin-bottom:20px; font-size:20px; }
    .panel { display:none; }
    .panel.active { display:block; }
    label { font-size:13px; color:rgba(255,255,255,0.8); display:block; }
    .input-wrap { position:relative; margin:6px 0 14px; }
    .input-wrap input {
      width:100%; padding:10px 12px;
      border-radius:8px; border:1px solid rgba(212,175,55,0.3);
      background:rgba(255,255,255,0.1); color:white;
      font-size:14px; outline:none; font-family:"Poppins",sans-serif;
      caret-color:white; box-shadow:none; appearance:none;
    }
    .input-wrap input:focus { border-color:#d4af37; box-shadow:0 0 0 2px rgba(212,175,55,0.15); }
    .input-wrap input::placeholder { color:rgba(255,255,255,0.4); }
    .eye-btn {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.5);
      padding:4px; display:flex; align-items:center;
    }
    .eye-btn:hover { color:#d4af37; }
    .main-btn {
      width:100%; padding:12px; border:none; border-radius:25px;
      font-size:14px; font-weight:bold; cursor:pointer;
      background:linear-gradient(135deg,#d4af37,#f5e6c8); color:#0b1f3a;
      transition:0.3s; margin-top:4px; font-family:"Poppins",sans-serif;
    }
    .main-btn:hover { transform:scale(1.03); }
    .main-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .msg {
      text-align:center; padding:10px; border-radius:8px;
      font-size:13px; margin-bottom:14px; display:none;
    }
    .msg.error   { background:rgba(255,80,80,0.2);   color:#fca5a5; display:block; }
    .msg.success { background:rgba(74,222,128,0.15); color:#86efac; display:block; }
    .switch { text-align:center; margin-top:14px; font-size:13px; color:rgba(255,255,255,0.6); }
    .switch a { color:#d4af37; cursor:pointer; font-weight:600; }
    .divider {
      display:flex; align-items:center; gap:10px;
      margin:18px 0; color:rgba(255,255,255,0.35); font-size:12px;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.15); }
    .google-btn {
      width:100%; padding:11px 16px;
      display:flex; align-items:center; justify-content:center; gap:12px;
      border:1px solid rgba(255,255,255,0.2); border-radius:25px;
      background:white; color:#3c4043;
      font-size:14px; font-weight:600; cursor:pointer;
      font-family:"Poppins",sans-serif; transition:0.25s;
      text-decoration:none;
    }
    .google-btn:hover { box-shadow:0 4px 18px rgba(0,0,0,0.25); transform:scale(1.02); }
    .google-btn svg { width:20px; height:20px; flex-shrink:0; }
    .forgot-link {
      display:block; text-align:right; font-size:12px;
      color:#d4af37; cursor:pointer; margin-top:-8px; margin-bottom:14px;
    }
    .forgot-link:hover { text-decoration:underline; }
    .otp-row { display:flex; gap:8px; margin:6px 0 14px; }
    .otp-row input {
      flex:1; padding:10px 12px;
      border-radius:8px; border:1px solid rgba(212,175,55,0.3);
      background:rgba(255,255,255,0.1); color:white;
      font-size:14px; outline:none; font-family:"Poppins",sans-serif;
      caret-color:white;
    }
    .otp-row input:focus { border-color:#d4af37; box-shadow:0 0 0 2px rgba(212,175,55,0.15); }
    .otp-row input::placeholder { color:rgba(255,255,255,0.4); }
    .send-otp-btn {
      padding:10px 14px; border:none; border-radius:8px;
      background:rgba(212,175,55,0.25); color:#d4af37; border:1px solid rgba(212,175,55,0.4);
      font-size:13px; font-weight:600; cursor:pointer;
      font-family:"Poppins",sans-serif; white-space:nowrap; transition:0.2s;
    }
    .send-otp-btn:hover { background:rgba(212,175,55,0.4); }
    .send-otp-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .resend-row { text-align:center; font-size:12px; color:rgba(255,255,255,0.5); margin-top:-6px; margin-bottom:10px; }
    .resend-row span { color:#d4af37; cursor:pointer; }
    .resend-row span.disabled { color:rgba(255,255,255,0.35); cursor:not-allowed; pointer-events:none; }
    @media (max-width: 480px) {
      .box { padding: 24px 18px; }
      h2 { font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="box">

  <!-- LOGIN -->
  <div id="loginPanel" class="panel active">
    <h2>&#127891; Student Login</h2>
    <div class="msg" id="loginMsg"></div>
    <label>Email</label>
    <div class="input-wrap">
      <input type="email" id="loginEmail" placeholder="Enter your email" />
    </div>
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="loginPassword" placeholder="Enter your password" id="loginPassword" />
      <button class="eye-btn" type="button" onclick="toggleEye('loginPassword',this)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <span class="forgot-link" onclick="showForgot()">Forgot password?</span>
    <button class="main-btn" onclick="login()">Login</button>
    <div class="divider">or continue with</div>
    <a class="google-btn" id="googleLoginBtn" href="/auth/google">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign in with Google
    </a>
    <p class="switch">No account? <a onclick="showRegister()">Register here</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerPanel" class="panel">
    <h2>&#10024; Create Account</h2>
    <div class="msg" id="registerMsg"></div>
    <label>Full Name</label>
    <div class="input-wrap"><input type="text" id="regName" placeholder="Enter your name" /></div>
    <label>Email</label>
    <div class="otp-row">
      <input type="email" id="regEmail" placeholder="Enter your email" />
      <button class="send-otp-btn" id="regOtpBtn" onclick="sendOtp('reg')">Send OTP</button>
    </div>
    <div id="regOtpSection" style="display:none">
      <label>OTP</label>
      <div class="input-wrap"><input type="text" id="regOtp" placeholder="Enter 6-digit OTP" maxlength="6" /></div>
      <div class="resend-row">Didn't get it? <span id="regResend" onclick="sendOtp('reg')" class="disabled">Resend</span> <span id="regTimer"></span></div>
    </div>
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="regPassword" placeholder="Create a password" />
      <button class="eye-btn" type="button" onclick="toggleEye('regPassword',this)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="regConfirm" placeholder="Confirm your password" />
      <button class="eye-btn" type="button" onclick="toggleEye('regConfirm',this)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <button class="main-btn" onclick="register()">Create Account</button>
    <div class="divider">or continue with</div>
    <a class="google-btn" id="googleRegisterBtn" href="/auth/google">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign up with Google
    </a>
    <p class="switch">Already registered? <a onclick="showLogin()">Login here</a></p>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="forgotPanel" class="panel">
    <h2>🔑 Forgot Password</h2>
    <div class="msg" id="forgotMsg"></div>
    <label>Email</label>
    <div class="otp-row">
      <input type="email" id="forgotEmail" placeholder="Enter your email" />
      <button class="send-otp-btn" id="forgotOtpBtn" onclick="sendOtp('forgot')">Send OTP</button>
    </div>
    <div id="forgotOtpSection" style="display:none">
      <label>OTP</label>
      <div class="input-wrap"><input type="text" id="forgotOtp" placeholder="Enter 6-digit OTP" maxlength="6" /></div>
      <div class="resend-row">Didn't get it? <span id="forgotResend" onclick="sendOtp('forgot')" class="disabled">Resend</span> <span id="forgotTimer"></span></div>
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" id="newPassword" placeholder="Enter new password" />
        <button class="eye-btn" type="button" onclick="toggleEye('newPassword',this)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <label>Confirm New Password</label>
      <div class="input-wrap">
        <input type="password" id="newPasswordConfirm" placeholder="Confirm new password" />
        <button class="eye-btn" type="button" onclick="toggleEye('newPasswordConfirm',this)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button class="main-btn" onclick="resetPassword()">Reset Password</button>
    </div>
    <p class="switch"><a onclick="showLogin()">&#8592; Back to Login</a></p>
  </div>

</div>

<script>
  // ── Eye toggle ──
  function toggleEye(inputId, btn) {
    const inp = document.getElementById(inputId);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  // ── Panel nav ──
  function showLogin()    { setPanel('loginPanel'); }
  function showRegister() { setPanel('registerPanel'); }
  function showForgot()   { setPanel('forgotPanel'); }
  function setPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function msg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'msg ' + type;
  }
  function clearMsg(id) { const el=document.getElementById(id); el.textContent=''; el.className='msg'; }

  // ── Countdown timer ──
  const timers = {};
  function startCountdown(prefix, seconds) {
    const resend = document.getElementById(prefix+'Resend');
    const timerEl = document.getElementById(prefix+'Timer');
    resend.classList.add('disabled');
    if (timers[prefix]) clearInterval(timers[prefix]);
    let left = seconds;
    timerEl.textContent = '(' + left + 's)';
    timers[prefix] = setInterval(() => {
      left--;
      if (left <= 0) {
        clearInterval(timers[prefix]);
        timerEl.textContent = '';
        resend.classList.remove('disabled');
      } else {
        timerEl.textContent = '(' + left + 's)';
      }
    }, 1000);
  }

  // ── Send OTP ──
  async function sendOtp(context) {
    const emailId = context === 'reg' ? 'regEmail' : 'forgotEmail';
    const msgId   = context === 'reg' ? 'registerMsg' : 'forgotMsg';
    const btnId   = context === 'reg' ? 'regOtpBtn' : 'forgotOtpBtn';
    const sectionId = context === 'reg' ? 'regOtpSection' : 'forgotOtpSection';

    const email = document.getElementById(emailId).value.trim();
    if (!email) return msg(msgId, '⚠️ Enter your email first.', 'error');

    const btn = document.getElementById(btnId);
    btn.disabled = true; btn.textContent = 'Sending…';
    clearMsg(msgId);

    try {
      const res = await fetch('/send-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, context })
      });
      const data = await res.json();
      if (data.ok) {
        msg(msgId, '📧 OTP sent to ' + email, 'success');
        document.getElementById(sectionId).style.display = 'block';
        startCountdown(context, 60);
        btn.textContent = 'Resend';
      } else {
        msg(msgId, '❌ ' + data.msg, 'error');
        btn.disabled = false; btn.textContent = 'Send OTP';
      }
    } catch(e) {
      msg(msgId, '⚠️ Could not connect to server.', 'error');
      btn.disabled = false; btn.textContent = 'Send OTP';
    }
  }

  // ── URL / session helpers ──
  const params = new URLSearchParams(window.location.search);
  (function() {
    const isGoogleCallback = params.get('google') === 'success';
    if (!isGoogleCallback && localStorage.getItem('loggedIn') === 'true') {
      localStorage.removeItem('loggedIn'); localStorage.removeItem('userName');
    }
  })();
  function getNextPage() {
    const next = params.get('next');
    const allowed = ['admissions.html'];
    if (next && allowed.includes(next)) return next;
    return 'index.html';
  }
  (function() {
    const next = params.get('next') || '';
    const allowed = ['admissions.html'];
    const safeNext = allowed.includes(next) ? next : '';
    const googleHref = '/auth/google' + (safeNext ? '?next=' + encodeURIComponent(safeNext) : '');
    document.getElementById('googleLoginBtn').href    = googleHref;
    document.getElementById('googleRegisterBtn').href = googleHref;
  })();
  if (params.get('google') === 'success') {
    const name = params.get('name'); const next = params.get('next') || 'index.html';
    localStorage.setItem('loggedIn','true'); localStorage.setItem('userName', decodeURIComponent(name));
    window.location.replace(next);
  }
  if (params.get('google') === 'error') { showLogin(); msg('loginMsg','❌ Google sign-in failed. Please try again.','error'); }
  if (params.get('form') === 'register') showRegister(); else showLogin();

  // ── Login ──
  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return msg('loginMsg','⚠️ Please fill all fields.','error');
    try {
      const adminRes = await fetch('/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const adminData = await adminRes.json();
      if (adminData.ok) {
        sessionStorage.setItem('adminLoggedIn','true');
        sessionStorage.setItem('adminToken', adminData.token || '');
        msg('loginMsg','🛡️ Admin access granted! Redirecting…','success');
        setTimeout(()=>window.location.replace('admin-dashboard.html'),900); return;
      }
    } catch(e){}
    try {
      const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem('loggedIn','true'); localStorage.setItem('userName',data.name);
        msg('loginMsg','✅ Welcome back '+data.name+'!','success');
        setTimeout(()=>window.location.replace(getNextPage()),1000);
      } else msg('loginMsg','❌ '+data.msg,'error');
    } catch(e) { msg('loginMsg','⚠️ Could not connect to server.','error'); }
  }

  // ── Register ──
  async function register() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const otp      = document.getElementById('regOtp').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm  = document.getElementById('regConfirm').value;
    if (!name||!email||!otp||!password||!confirm) return msg('registerMsg','⚠️ Please fill all fields.','error');
    if (password !== confirm) return msg('registerMsg','⚠️ Passwords do not match.','error');
    // Verify OTP first
    try {
      const vRes = await fetch('/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp,context:'reg'})});
      const vData = await vRes.json();
      if (!vData.ok) return msg('registerMsg','❌ '+vData.msg,'error');
    } catch(e) { return msg('registerMsg','⚠️ Could not connect to server.','error'); }
    // Register
    try {
      const res = await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem('loggedIn','true'); localStorage.setItem('userName',data.name);
        msg('registerMsg','✅ Account created! Redirecting…','success');
        setTimeout(()=>window.location.replace(getNextPage()),1000);
      } else msg('registerMsg','❌ '+data.msg,'error');
    } catch(e) { msg('registerMsg','⚠️ Could not connect to server.','error'); }
  }

  // ── Reset Password ──
  async function resetPassword() {
    const email    = document.getElementById('forgotEmail').value.trim();
    const otp      = document.getElementById('forgotOtp').value.trim();
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('newPasswordConfirm').value;
    if (!email||!otp||!password||!confirm) return msg('forgotMsg','⚠️ Please fill all fields.','error');
    if (password !== confirm) return msg('forgotMsg','⚠️ Passwords do not match.','error');
    if (password.length < 6) return msg('forgotMsg','⚠️ Password must be at least 6 characters.','error');
    try {
      const res = await fetch('/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp,password})});
      const data = await res.json();
      if (data.ok) {
        msg('forgotMsg','✅ Password reset! Redirecting to login…','success');
        setTimeout(()=>showLogin(),1500);
      } else msg('forgotMsg','❌ '+data.msg,'error');
    } catch(e) { msg('forgotMsg','⚠️ Could not connect to server.','error'); }
  }
</script>
</body>
</html>
